name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PROD secrets
        run: |
          set -e
          missing=0
          [ -z "${{ secrets.PROD_HOST }}" ] && echo "Missing PROD_HOST" && missing=1 || true
          [ -z "${{ secrets.PROD_USER }}" ] && echo "Missing PROD_USER" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ] && echo "Missing PROD_SSH_PRIVATE_KEY" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PORT }}" ] && echo "Missing PROD_SSH_PORT" && missing=1 || true
          [ "$missing" -ne 0 ] && exit 1
          echo "PROD secrets OK"

      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config << EOF
          Host production
            HostName ${PROD_HOST}
            Port ${PROD_PORT}
            User ${PROD_USER}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
            Compression yes
            ConnectTimeout 30
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH connection
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if ssh production 'echo "SSH OK"'; then
              exit 0
            fi
            echo "SSH attempt ${attempt}/5 failed, waiting 20s..."
            sleep 20
          done
          echo "ERROR: cannot connect to production host"
          exit 1

      - name: Pack sources
        run: |
          set -euo pipefail
          tar -czf /tmp/af-src.tgz \
            --exclude='.git' \
            --exclude='**/bin' \
            --exclude='**/obj' \
            --exclude='**/node_modules' \
            --exclude='profiles/*/browser-data' \
            --exclude='**/*.db' \
            --exclude='**/*.db-shm' \
            --exclude='**/*.db-wal' \
            .
          ls -lh /tmp/af-src.tgz

      - name: Upload sources
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if scp /tmp/af-src.tgz production:/tmp/af-src.tgz; then
              ssh production 'ls -lh /tmp/af-src.tgz'
              exit 0
            fi
            echo "Upload attempt ${attempt}/5 failed, waiting 20s..."
            sleep 20
          done
          echo "ERROR: failed to upload sources after 5 attempts"
          exit 1

      - name: Deploy on server
        env:
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_FE_PORT: ${{ secrets.PROD_FRONTEND_PORT }}
          PROD_API_PORT: ${{ secrets.PROD_API_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RSYA_OAUTH_TOKEN: ${{ secrets.RSYA_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${PROD_DEPLOY_PATH:-/opt/awardsferm}"
          FE_PORT="${PROD_FE_PORT:-55504}"
          API_PORT="${PROD_API_PORT:-55503}"

          ssh production \
            "DEPLOY_PATH='$DEPLOY_PATH' FE_PORT='$FE_PORT' API_PORT='$API_PORT' JWT_SECRET='$JWT_SECRET' RSYA_OAUTH_TOKEN='$RSYA_OAUTH_TOKEN' bash -s" << 'REMOTE'
          set -eo pipefail

          echo "==> Deploy path: $DEPLOY_PATH"
          if [ ! -f /tmp/af-src.tgz ]; then
            echo "ERROR: /tmp/af-src.tgz not found"
            exit 1
          fi

          mkdir -p "$DEPLOY_PATH/profiles"
          tar -xzf /tmp/af-src.tgz -C "$DEPLOY_PATH"
          rm -f /tmp/af-src.tgz
          cd "$DEPLOY_PATH"

          echo "==> Write .env.production"
          umask 077
          if [ -z "$FE_PORT" ]; then FE_PORT=55504; fi
          if [ -z "$API_PORT" ]; then API_PORT=55503; fi
          if [ -z "$JWT_SECRET" ] && [ -f .env.production ]; then
            JWT_SECRET=$(grep '^JWT_SECRET=' .env.production | cut -d= -f2- || true)
          fi
          if [ -z "$JWT_SECRET" ]; then JWT_SECRET=$(openssl rand -base64 48); fi
          {
            echo "DEPLOY_PATH=$DEPLOY_PATH"
            echo "FRONTEND_PORT=$FE_PORT"
            echo "API_PORT=$API_PORT"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "BROWSER_HEADLESS=true"
            if [ -n "$RSYA_OAUTH_TOKEN" ]; then
              echo "RSYA_OAUTH_TOKEN=$RSYA_OAUTH_TOKEN"
            fi
          } > .env.production
          chmod 600 .env.production
          chmod -R a+rwX "$DEPLOY_PATH/profiles" 2>/dev/null || true

          run_compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose "$@"
            else
              echo "ERROR: install Docker Compose"
              exit 1
            fi
          }

          if ! run_compose -f docker-compose.production.yml --env-file .env.production up -d --build --remove-orphans; then
            echo "ERROR: docker compose up failed"
            exit 1
          fi

          sleep 8
          CODE=$(curl -sS -o /tmp/af_health.txt -w "%{http_code}" --max-time 30 "http://127.0.0.1:${API_PORT}/api/health" || echo "000")
          echo "GET /api/health HTTP $CODE"
          docker image prune -f || true
          echo "==> Done"
          REMOTE
